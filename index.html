<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
    <title>Finanças Pro v7.84</title>
    <style>
        :root {
            --bg: #0f172a; --bg2: #1e293b; --bg3: #334155; --accent: #6366f1;
            --txt: #f8fafc; --txt2: #94a3b8; --side-w: 260px; --side-min: 80px;
            --green: #10b981; --red: #f43f5e; --orange: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { height: 100dvh; background: var(--bg); color: var(--txt); display: flex; overflow: hidden; }

        /* PIN SCREEN */
        #lock { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #pin-dots { font-size: 3rem; height: 60px; margin-bottom: 20px; color: var(--accent); letter-spacing: 12px; }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .pin-btn { width: 75px; height: 75px; border-radius: 50%; background: var(--bg2); color: #fff; font-size: 1.5rem; border: none; cursor: pointer; }

        /* SIDEBAR */
        #sidebar {
            width: var(--side-w); height: 100%; background: var(--bg2);
            display: none; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.1);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar.collapsed { width: var(--side-min); }
        .side-item {
            width: 100%; height: 50px; border: none; background: none; color: var(--txt2);
            display: flex; align-items: center; padding: 0 25px; cursor: pointer; transition: 0.2s;
            overflow: hidden; white-space: nowrap;
        }
        .side-item.active { color: #fff; background: var(--accent); }
        .side-item svg { min-width: 24px; margin-right: 20px; stroke: currentColor; fill: none; stroke-width: 2; }

        /* MAIN CONTENT */
        #main { flex: 1; display: none; flex-direction: column; overflow-y: auto; padding: 25px; }
        .card { background: var(--bg2); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        
        /* FORMS */
        .f-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: var(--txt2); margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; background: var(--bg3); border: 1px solid rgba(255,255,255,0.1); color: #fff; }
        .btn-main { background: var(--accent); color: #fff; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; bottom: 0; width: 100%; height: 70px; flex-direction: row; border-top: 1px solid rgba(255,255,255,0.1); }
            .side-item { flex-direction: column; font-size: 10px; padding: 10px 0; height: 100%; justify-content: center; }
            .side-item svg { margin-right: 0; margin-bottom: 4px; }
            #main { padding-bottom: 90px; }
        }
    </style>
</head>
<body>

<div id="lock">
    <div id="pin-dots"></div>
    <div class="pin-grid" id="keyboard"></div>
</div>

<aside id="sidebar">
    <div style="height:70px; padding:20px; font-weight:800; color:var(--accent)">PRO v7.84</div>
    <button class="side-item active" onclick="nav('dash', this)">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> <span>Dashboard</span>
    </button>
    <button class="side-item" onclick="nav('lancar', this)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg> <span>Lançar</span>
    </button>
    <button class="side-item" onclick="nav('extrato', this)">
        <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg> <span>Extrato</span>
    </button>
    <button class="side-item" onclick="nav('cartoes', this)">
        <svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> <span>Cartões/Contas</span>
    </button>
    <button class="side-item" onclick="nav('config', this)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> <span>Config</span>
    </button>
</aside>

<main id="main">
    <div id="app-content"></div>
</main>

<script src="app.js"></script>
</body>
</html>
