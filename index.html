<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
    <title>Finanças Pro v7.84</title>
    <style>
        :root {
            --bg: #0f172a; --bg2: #1e293b; --txt: #f8fafc; --txt2: #94a3b8;
            --accent: #6366f1; --side-w: 260px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            height: 100dvh; background: var(--bg); color: var(--txt); 
            font-family: sans-serif; display: flex; overflow: hidden; 
        }

        /* PIN SCREEN */
        #lock { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #pin-dots { font-size: 3rem; height: 60px; margin-bottom: 20px; color: var(--accent); letter-spacing: 8px; }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .pin-btn { width: 70px; height: 70px; border-radius: 50%; background: var(--bg2); color: #fff; font-size: 1.5rem; border: none; cursor: pointer; }

        /* SIDEBAR */
        #sidebar {
            width: var(--side-w); height: 100%; background: var(--bg2);
            display: none; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item {
            padding: 15px 20px; color: var(--txt2); cursor: pointer; border: none; background: none;
            text-align: left; font-size: 16px; width: 100%; display: flex; align-items: center;
        }
        .nav-item:hover, .nav-item.active { color: #fff; background: var(--accent); }

        /* CONTENT */
        #main { flex: 1; display: none; flex-direction: column; overflow-y: auto; padding: 20px; }
    </style>
</head>
<body>

<div id="lock">
    <div id="pin-dots"></div>
    <div class="pin-grid" id="keyboard"></div>
</div>

<aside id="sidebar">
    <div style="padding: 20px; font-weight: bold; font-size: 20px; color: var(--accent)">Finanças Pro</div>
    <button class="nav-item active" onclick="nav('home', this)">Dashboard</button>
    <button class="nav-item" onclick="nav('extrato', this)">Extrato</button>
    <button class="nav-item" onclick="nav('config', this)">Ajustes</button>
</aside>

<main id="main">
    <div id="app-content"></div>
</main>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
