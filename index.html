<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
    <title>Finanças Pro v7.84</title>
    <style>
        :root {
            --bg: #0f172a; --bg2: #1e293b; --txt: #f8fafc; --txt2: #94a3b8;
            --accent: #6366f1; --side-w: 260px; --side-min: 70px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100dvh; background: var(--bg); color: var(--txt); font-family: system-ui; display: flex; overflow: hidden; }

        /* BLOQUEIO */
        #lock { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #pin-dots { font-size: 3rem; height: 60px; margin-bottom: 20px; color: var(--accent); letter-spacing: 8px; }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .pin-btn { width: 70px; height: 70px; border-radius: 50%; background: var(--bg2); color: #fff; font-size: 1.5rem; border: none; cursor: pointer; }
        .pin-btn:active { background: var(--accent); }

        /* SIDEBAR */
        #sidebar {
            width: var(--side-w); height: 100%; background: var(--bg2);
            display: none; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.1);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
        }
        #sidebar.collapsed { width: var(--side-min); }
        
        .side-item {
            width: 100%; height: 55px; border: none; background: none; color: var(--txt2);
            display: flex; align-items: center; padding: 0 22px; cursor: pointer;
            overflow: hidden; white-space: nowrap; transition: 0.2s;
        }
        .side-item:hover, .side-item.active { color: #fff; background: rgba(99,102,241,0.1); border-left: 4px solid var(--accent); }
        .side-item svg { min-width: 24px; margin-right: 20px; stroke: currentColor; fill: none; stroke-width: 2; }

        /* MAIN CONTENT */
        #main { flex: 1; display: none; flex-direction: column; overflow-y: auto; position: relative; }
        #app-content { padding: 30px; max-width: 900px; width: 100%; margin: 0 auto; }

        #toggle-menu {
            position: absolute; bottom: 20px; left: 15px; background: var(--bg);
            border: none; color: var(--txt2); padding: 10px; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="lock">
    <div id="pin-dots"></div>
    <div class="pin-grid" id="keyboard"></div>
</div>

<aside id="sidebar">
    <div style="height: 70px; display: flex; align-items: center; padding-left: 20px; font-weight: bold; color: var(--accent)">
        <span class="label">FINANÇAS PRO</span>
    </div>
    
    <button class="side-item active" onclick="nav('home', this)">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span class="label">Dashboard</span>
    </button>
    
    <button class="side-item" onclick="nav('config', this)">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <span class="label">Sincronização</span>
    </button>

    <button id="toggle-menu" onclick="toggleSidebar()">☰</button>
</aside>

<main id="main">
    <div id="app-content"></div>
</main>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
